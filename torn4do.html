<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn4do</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --purple: #6C3FE8;
    --purple-light: #9B6FF5;
    --purple-dark: #3A1A9E;
    --bg: #08060F;
    --bg2: #0E0A1A;
    --text: #F0EAFF;
    --muted: #7A6A9A;
    --discord: #5865F2;
    --discord-hover: #4752C4;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(108,63,232,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(58,26,158,0.2) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 60% 10%, rgba(155,111,245,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,63,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,63,232,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  /* Tornado SVG */
  .tornado-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    margin-bottom: 3rem;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border-style: solid;
    border-color: transparent;
    border-top-color: var(--purple);
    border-right-color: var(--purple-light);
    animation: spin linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .r1 { width: 160px; height: 160px; top: 0; left: 0; border-width: 2.5px; animation-duration: 5s; }
  .r2 { width: 120px; height: 120px; top: 20px; left: 20px; border-width: 2px; animation-duration: 3.5s; animation-direction: reverse; border-top-color: var(--purple-light); border-right-color: var(--purple-dark); }
  .r3 { width: 80px; height: 80px; top: 40px; left: 40px; border-width: 1.5px; animation-duration: 2.5s; }
  .r4 { width: 44px; height: 44px; top: 58px; left: 58px; border-width: 1.5px; animation-duration: 1.8s; animation-direction: reverse; }

  .core {
    position: absolute;
    width: 16px; height: 16px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--purple-light);
    border-radius: 50%;
    box-shadow: 0 0 20px var(--purple), 0 0 40px var(--purple-dark);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.7; }
  }

  /* Name */
  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 18vw, 140px);
    letter-spacing: 0.06em;
    line-height: 0.9;
    background: linear-gradient(135deg, #F0EAFF 0%, var(--purple-light) 40%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    animation: nameIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes nameIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .name-shadow {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 18vw, 140px);
    letter-spacing: 0.06em;
    line-height: 0.9;
    color: transparent;
    -webkit-text-stroke: 1px rgba(108,63,232,0.2);
    position: absolute;
    top: 4px; left: 4px;
    z-index: -1;
    pointer-events: none;
  }

  .name-wrap {
    position: relative;
    margin-bottom: 1rem;
  }

  /* Tagline */
  .tagline {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3rem;
    animation: fadeUp 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Divider */
  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple), transparent);
    margin: 0 auto 3rem;
    animation: fadeUp 1s 0.5s both;
  }

  /* Discord Button */
  .discord-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--discord);
    color: #fff;
    text-decoration: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px 40px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 4px 30px rgba(88,101,242,0.4);
    animation: fadeUp 1s 0.7s both;
  }

  .discord-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  .discord-btn:hover {
    background: var(--discord-hover);
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(88,101,242,0.6);
  }

  .discord-btn:active {
    transform: translateY(0);
  }

  .discord-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  /* Badges */
  .badges {
    display: flex;
    gap: 10px;
    margin-top: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 1s 0.9s both;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--purple-light);
    border: 1px solid rgba(108,63,232,0.3);
    padding: 5px 14px;
    border-radius: 2px;
    background: rgba(108,63,232,0.06);
  }

  /* Streaks */
  .streaks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .streak {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(108,63,232,0.5), transparent);
    border-radius: 2px;
    animation: streakMove linear infinite;
  }

  @keyframes streakMove {
    from { transform: translateX(-50vw); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    to { transform: translateX(150vw); opacity: 0; }
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 1.5rem;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: rgba(122,106,154,0.4);
    text-transform: uppercase;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="streaks">
  <div class="streak" style="width: 35vw; top: 18%; animation-duration: 6s; animation-delay: 0s;"></div>
  <div class="streak" style="width: 20vw; top: 35%; animation-duration: 4.5s; animation-delay: 1.5s;"></div>
  <div class="streak" style="width: 45vw; top: 55%; animation-duration: 7s; animation-delay: 0.8s;"></div>
  <div class="streak" style="width: 25vw; top: 72%; animation-duration: 5s; animation-delay: 2.2s;"></div>
  <div class="streak" style="width: 30vw; top: 88%; animation-duration: 5.5s; animation-delay: 3s;"></div>
</div>

<div class="container">

  <div class="tornado-wrap">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>

  <div class="name-wrap">

    <div class="name-shadow">Torn4do</div>
  </div>

  <p class="tagline">Unstoppable &nbsp;·&nbsp; Legendary &nbsp;·&nbsp; One of One</p>

  <div class="divider"></div>
